name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: git.mitsea.com
          username: FlintyLemming
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            git.mitsea.com/flintylemming/ai-plan-insight:latest
            git.mitsea.com/flintylemming/ai-plan-insight:${{ gitea.ref_name }}

      - name: Link package to repository
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.REGISTRY_TOKEN }}" \
            "${{ gitea.api_url }}/packages/FlintyLemming/container/ai-plan-insight/-/link/ai-plan-insight"
