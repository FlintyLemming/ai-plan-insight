services:
  ai-plan-insight:
    build: .
    ports:
      - "8000:8000"
    command: python -m ai_plan_insight --web --host 0.0.0.0 --port 8000 --config /data/config.json
    volumes:
      # 目录中放 config.json 和 config.v2.json，usage.db 也会生成在这里
      - ./data:/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
