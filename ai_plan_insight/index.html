<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Plan Insight</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  .updated { font-size: 0.8rem; color: #64748b; margin-bottom: 2rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 1.5rem;
    width: 100%;
    max-width: 1140px;
  }
  .card {
    background: #1e293b;
    border-radius: 12px;
    padding: 1.5rem;
    border: 1px solid #334155;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1.25rem;
  }
  .card-title { font-size: 1.15rem; font-weight: 600; }
  .card-subtitle { font-size: 0.8rem; color: #94a3b8; }
  .card-header-right {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .view-toggle {
    border: 1px solid #475569;
    background: #0f172a;
    color: #cbd5e1;
    border-radius: 999px;
    padding: 0.15rem 0.5rem;
    font-size: 0.72rem;
    cursor: pointer;
  }
  .view-toggle:hover { border-color: #38bdf8; color: #e0f2fe; }
  .history-summary {
    font-size: 0.9rem;
    color: #cbd5e1;
    margin-bottom: 0.75rem;
  }
  .history-chart {
    width: 100%;
    height: 180px;
    margin-bottom: 0.75rem;
    position: relative;
    touch-action: none;
  }
  .history-axis { stroke: #334155; stroke-width: 1; }
  .history-grid-line { stroke: #273449; stroke-width: 1; }
  .history-line { fill: none; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  .history-cursor {
    stroke: #94a3b8;
    stroke-width: 1;
    stroke-dasharray: 3 3;
    pointer-events: none;
  }
  .history-cursor-dot {
    r: 3;
    pointer-events: none;
  }
  .history-tooltip {
    position: absolute;
    pointer-events: none;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 0.5rem 0.65rem;
    font-size: 0.78rem;
    color: #e2e8f0;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
    transform: translate(-50%, calc(-100% - 8px));
    white-space: nowrap;
    z-index: 10;
    display: none;
  }
  .history-tooltip-date {
    font-weight: 600;
    margin-bottom: 0.3rem;
    color: #f1f5f9;
  }
  .history-tooltip-row {
    display: flex;
    justify-content: space-between;
    gap: 0.85rem;
    align-items: center;
    padding: 0.12rem 0;
  }
  .history-tooltip-model {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    color: #cbd5e1;
  }
  .history-tooltip-tokens {
    font-variant-numeric: tabular-nums;
    color: #e2e8f0;
  }
  .history-model-row {
    display: flex;
    justify-content: space-between;
    gap: 0.75rem;
    font-size: 0.8rem;
    padding: 0.28rem 0;
    color: #cbd5e1;
    border-bottom: 1px solid #334155;
  }
  .history-model-row:last-child { border-bottom: none; }
  .history-model-name {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    min-width: 0;
  }
  .history-model-name span:last-child {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-dot {
    width: 0.55rem;
    height: 0.55rem;
    border-radius: 999px;
    flex: 0 0 auto;
  }
  .empty-history {
    color: #64748b;
    font-size: 0.85rem;
    padding: 1.5rem 0;
    text-align: center;
  }
  .limit-row { margin-bottom: 1rem; }
  .balance-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid #334155;
  }
  .balance-row:last-child { border-bottom: none; }
  .balance-row span:last-child {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .limit-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    margin-bottom: 0.35rem;
    color: #94a3b8;
  }
  .bar-bg {
    height: 8px;
    background: #334155;
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .bar-fill.low { background: #22c55e; }
  .bar-fill.mid { background: #eab308; }
  .bar-fill.high { background: #ef4444; }
  .limit-meta {
    font-size: 0.75rem;
    color: #64748b;
    margin-top: 0.25rem;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    padding: 0.2rem 0;
    color: #cbd5e1;
    margin-left: 0.5rem;
  }
  .error-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 1.5rem;
    border: 1px solid #7f1d1d;
    color: #fca5a5;
  }
  #loading { color: #64748b; }
  .tab-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .tab {
    border: 1px solid #334155;
    background: #1e293b;
    color: #94a3b8;
    border-radius: 8px;
    padding: 0.4rem 1rem;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .tab.active {
    border-color: #38bdf8;
    color: #e0f2fe;
    background: #0f172a;
  }
  .tab:hover { border-color: #475569; color: #cbd5e1; }
  .range-pills {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }
  .range-pill {
    border: 1px solid #475569;
    background: #0f172a;
    color: #cbd5e1;
    border-radius: 999px;
    padding: 0.15rem 0.75rem;
    font-size: 0.78rem;
    cursor: pointer;
  }
  .range-pill:hover { border-color: #38bdf8; color: #e0f2fe; }
  .range-pill.active {
    border-color: #38bdf8;
    background: #38bdf8;
    color: #0f172a;
    font-weight: 600;
  }
  #usage-chart-container { position: relative; width: 100%; max-width: 1140px; }
  .usage-axis { stroke: #334155; stroke-width: 1; }
  .usage-grid { stroke: #273449; stroke-width: 1; }
  .usage-axis-text { fill: #64748b; font-size: 11px; }
  .usage-legend-text { fill: #cbd5e1; font-size: 12px; }
  .usage-hover { cursor: pointer; }
  .empty-usage {
    color: #64748b;
    font-size: 0.95rem;
    padding: 3rem 0;
    text-align: center;
  }
  .usage-tooltip {
    position: absolute;
    pointer-events: none;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 0.5rem 0.65rem;
    font-size: 0.78rem;
    color: #e2e8f0;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
    transform: translate(-50%, calc(-100% - 8px));
    white-space: nowrap;
    z-index: 20;
    display: none;
  }
  .usage-tooltip-date { font-weight: 600; margin-bottom: 0.3rem; color: #f1f5f9; }
  .usage-tooltip-row {
    display: flex;
    justify-content: space-between;
    gap: 0.85rem;
    align-items: center;
    padding: 0.12rem 0;
  }
  .usage-tooltip-model {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    color: #cbd5e1;
  }
  .usage-tooltip-tokens { font-variant-numeric: tabular-nums; color: #e2e8f0; }
</style>
</head>
<body>
  <h1>AI Plan Insight</h1>
  <div class="tab-bar">
    <button class="tab active" data-tab="balance">订阅余额</button>
    <button class="tab" data-tab="usage">模型用量</button>
  </div>
  <div class="updated" id="updated">加载中...</div>
  <div id="loading">正在获取数据...</div>
  <div class="grid" id="grid" style="display:none;"></div>
  <div id="usage-chart-view" style="display:none;">
    <div class="range-pills" id="range-pills">
      <button class="range-pill" data-range="90">90天</button>
      <button class="range-pill" data-range="30">30天</button>
      <button class="range-pill" data-range="7">7天</button>
    </div>
    <div id="usage-chart-container"></div>
  </div>

<script>
const TIME_UNIT_LABELS = {
  second: '秒', minute: '分钟', hour: '小时',
  day: '天', week: '周', month: '月', year: '年',
  tokens_limit: '模型调用',
};

const TAB_KEY = 'ai-plan-insight:tab';
let activeTab = localStorage.getItem(TAB_KEY) || 'balance';

function applyTab(tab) {
  activeTab = tab;
  localStorage.setItem(TAB_KEY, tab);
  document.querySelectorAll('.tab').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-tab') === tab);
  });
  const showBalance = tab === 'balance';
  document.getElementById('grid').style.display = showBalance ? '' : 'none';
  document.getElementById('usage-chart-view').style.display = showBalance ? 'none' : 'block';
  if (!showBalance) {
    refreshUsageChart();
  }
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => applyTab(btn.getAttribute('data-tab')));
});

applyTab(activeTab);

const RANGE_KEY = 'ai-plan-insight:usage-range';
let usageRange = Number(localStorage.getItem(RANGE_KEY)) || 90;

function applyUsageRange(range) {
  usageRange = range;
  localStorage.setItem(RANGE_KEY, String(range));
  document.querySelectorAll('.range-pill').forEach(btn => {
    btn.classList.toggle('active', Number(btn.getAttribute('data-range')) === range);
  });
  refreshUsageChart();
}

document.querySelectorAll('.range-pill').forEach(btn => {
  btn.addEventListener('click', () => applyUsageRange(Number(btn.getAttribute('data-range'))));
});

applyUsageRange(usageRange);

const USAGE_COLORS = ['#38bdf8', '#f59e0b', '#34d399', '#f472b6', '#a78bfa', '#fbbf24', '#22d3ee', '#fb7185'];
const USAGE_OTHER_COLOR = '#64748b';
let lastUsageModels = [];  // [{label,color,...}] from the most recent fetch

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

function formatUsageDate(label) {
  const parts = String(label || '').split('-');
  if (parts.length === 3) return `${parts[1]}月${parts[2]}日`;
  return String(label);
}

function renderUsageChart(data) {
  const container = document.getElementById('usage-chart-container');
  if (!data || !data.days || data.days.length === 0) {
    container.innerHTML = '<div class="empty-usage">暂无用量数据</div>';
    return;
  }

  const days = data.days;
  const modelSummary = data.models;
  lastUsageModels = modelSummary;

  const colorByLabel = {};
  modelSummary.forEach(m => { colorByLabel[m.label] = m.color; });

  const W = 1000, H = 400, padL = 52, padR = 16, padT = 16, padB = 44;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const baseY = H - padB;

  const dailyTotals = days.map(d => d.models.reduce((s, m) => s + m.total, 0));
  const maxTotal = Math.max(...dailyTotals, 1);

  const n = days.length;
  const slot = plotW / n;
  const barW = Math.min(slot * 0.7, 44);

  // Y gridlines + value labels
  const steps = 4;
  let gridSvg = '';
  for (let i = 0; i <= steps; i++) {
    const val = (maxTotal / steps) * i;
    const y = baseY - (val / maxTotal) * plotH;
    gridSvg += `<line class="usage-grid" x1="${padL}" y1="${y.toFixed(1)}" x2="${W - padR}" y2="${y.toFixed(1)}"/>`;
    gridSvg += `<text class="usage-axis-text" x="${padL - 8}" y="${(y + 3).toFixed(1)}" text-anchor="end">${formatTokens(val)}</text>`;
  }

  // Stacked bars + hover capture + X labels
  const labelEvery = n > 60 ? 7 : (n > 10 ? 3 : 1);
  let barsSvg = '';
  days.forEach((day, idx) => {
    const cx = padL + slot * idx + slot / 2;
    const x = cx - barW / 2;
    let cursor = baseY;
    const present = modelSummary
      .map(m => day.models.find(dm => dm.label === m.label))
      .filter(Boolean);
    present.forEach(m => {
      const h = (m.total / maxTotal) * plotH;
      const y = cursor - h;
      barsSvg += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" fill="${m.color}"/>`;
      cursor = y;
    });
    barsSvg += `<rect class="usage-hover" data-idx="${idx}" x="${(padL + slot * idx).toFixed(1)}" y="${padT}" width="${slot.toFixed(1)}" height="${plotH}" fill="transparent"/>`;
    if (idx % labelEvery === 0) {
      barsSvg += `<text class="usage-axis-text" x="${cx.toFixed(1)}" y="${(baseY + 18).toFixed(1)}" text-anchor="middle">${formatUsageDate(day.date)}</text>`;
    }
  });

  // Legend, top-right inside the chart
  let legendSvg = '';
  modelSummary.forEach((m, i) => {
    const ly = padT + 4 + i * 18;
    legendSvg += `<rect x="${W - padR - 168}" y="${ly}" width="10" height="10" fill="${m.color}"/>`;
    legendSvg += `<text class="usage-legend-text" x="${W - padR - 152}" y="${ly + 9}">${escapeHtml(m.label)} ${m.share_pct.toFixed(1)}%</text>`;
  });

  container.innerHTML = `
<svg id="usage-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
  <line class="usage-axis" x1="${padL}" y1="${baseY}" x2="${W - padR}" y2="${baseY}"/>
  ${gridSvg}
  ${barsSvg}
  ${legendSvg}
</svg>
<div class="usage-tooltip" id="usage-tooltip"></div>`;

  // Tooltip wiring: position the overlay div at the mouse, render per-model rows.
  const svgEl = document.getElementById('usage-svg');
  const tooltip = document.getElementById('usage-tooltip');
  const containerRect0 = container.getBoundingClientRect();
  svgEl.querySelectorAll('.usage-hover').forEach(rect => {
    rect.addEventListener('mousemove', (e) => {
      const idx = Number(rect.getAttribute('data-idx'));
      const day = days[idx];
      const rows = day.models
        .filter(m => m.total > 0)
        .map(m => `<div class="usage-tooltip-row">
            <span class="usage-tooltip-model"><span class="history-dot" style="background:${colorByLabel[m.label] || USAGE_OTHER_COLOR}"></span><span>${escapeHtml(m.label)}</span></span>
            <span class="usage-tooltip-tokens">输入 ${formatTokens(m.input_tokens)} · 输出 ${formatTokens(m.output_tokens)} · 共 ${formatTokens(m.total)}</span>
          </div>`).join('');
      tooltip.innerHTML = `<div class="usage-tooltip-date">${formatUsageDate(day.date)}</div>${rows}`;
      const cr = container.getBoundingClientRect();
      tooltip.style.left = `${e.clientX - cr.left}px`;
      tooltip.style.top = `${e.clientY - cr.top}px`;
      tooltip.style.display = 'block';
    });
    rect.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
  });
}

function formatTimeWindow(l) {
  const key = l.time_unit.toLowerCase();
  if (key === 'tokens_limit') return '模型调用';
  const label = TIME_UNIT_LABELS[key] || l.time_unit;
  const window = `${l.duration} ${label}`;
  if (l.limit_type === 'TIME_LIMIT') return `${window} MCP 调用数量`;
  return window;
}

function formatReset(resetTime) {
  if (!resetTime) return '';
  const dt = new Date(resetTime);
  const now = new Date();
  const isToday = dt.toDateString() === now.toDateString();
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate() + 1);
  const isTomorrow = dt.toDateString() === tomorrow.toDateString();

  const time = dt.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  if (isToday) return `${time} 重置`;
  if (isTomorrow) return `明天 ${time} 重置`;
  return `${dt.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' })} ${time} 重置`;
}

function barClass(pct) {
  if (pct < 60) return 'low';
  if (pct < 85) return 'mid';
  return 'high';
}

const BALANCE_LABELS = {
  '余额': '余额',
  '信用额度': '信用额度',
  '总信用额度': '总信用额度',
  '奖励金': '奖励金',
  '保证金': '保证金',
  '欠款': '欠款',
  '币种': '币种',
  '套餐结束日期': '套餐结束日期',
  '余额重置日期': '余额重置日期',
  '套餐到期': '套餐到期',
  total: '总余额',
  gift: '赠送余额',
  recharge: '充值余额',
};

const MONEY_BALANCE_KEYS = new Set(['余额', '信用额度', '总信用额度', '奖励金', '保证金', '欠款', 'total', 'gift', 'recharge']);

const TOKEN_PERIOD_LABELS = {
  today: '今日',
  '7d': '近 7 天',
  '30d': '近 30 天',
};

const GLM_HISTORY_PROVIDERS = new Set(['GLM Coding Plan', '白嫖 GLM Coding Plan 国际版']);
const HISTORY_COLORS = ['#38bdf8', '#a78bfa', '#34d399', '#f59e0b', '#fb7185', '#e879f9'];
const cardViewModes = {};
let latestUsageData = [];

function hasHistoryUsage(data) {
  return GLM_HISTORY_PROVIDERS.has(data.provider) && data.history_usage;
}

function formatCount(n) {
  return Number(n || 0).toLocaleString('en-US');
}

function normalizeSeries(values, length) {
  const source = Array.isArray(values) ? values : [];
  const result = source.slice(0, length).map(v => Number(v || 0));
  while (result.length < length) result.push(0);
  return result;
}

function buildPolyline(values, maxValue, width, height, padX, padY) {
  if (!values.length) return '';
  const plotWidth = width - padX * 2;
  const plotHeight = height - padY * 2;
  return values.map((value, idx) => {
    const x = values.length === 1 ? width / 2 : padX + (idx * plotWidth / (values.length - 1));
    const y = height - padY - ((value / maxValue) * plotHeight);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
}

function buildHistoryPointCoords(values, maxValue, width, height, padX, padY) {
  const plotWidth = width - padX * 2;
  const plotHeight = height - padY * 2;
  return values.map((value, idx) => {
    const x = values.length === 1 ? width / 2 : padX + (idx * plotWidth / (values.length - 1));
    const y = height - padY - ((value / maxValue) * plotHeight);
    return { x, y, value, idx };
  });
}

function formatHistoryDate(label) {
  if (!label) return '';
  const parts = String(label).split('-');
  if (parts.length === 3) return `${parts[1]}月${parts[2]}日`;
  return String(label);
}

function showHistoryTooltip(svg, tooltipEl, idx, points, normalizedModels, dates) {
  if (idx < 0 || idx >= dates.length) return;
  const point = points[idx];
  const containerRect = tooltipEl.parentElement.getBoundingClientRect();
  const screenPt = svgToScreen(svg, point.x, point.y);

  const rows = normalizedModels
    .map(m => ({ name: m.model_name, color: m.color, value: m.tokens_usage[idx] }))
    .filter(row => row.value > 0);

  if (!rows.length) {
    tooltipEl.innerHTML = `<div class="history-tooltip-date">${formatHistoryDate(dates[idx])}</div><div class="history-tooltip-row"><span class="history-tooltip-tokens" style="color:#64748b">无用量</span></div>`;
  } else {
    tooltipEl.innerHTML = `<div class="history-tooltip-date">${formatHistoryDate(dates[idx])}</div>`
      + rows.map(row => `
        <div class="history-tooltip-row">
          <span class="history-tooltip-model"><span class="history-dot" style="background:${row.color}"></span><span>${row.name}</span></span>
          <span class="history-tooltip-tokens">${formatTokens(row.value)} tokens</span>
        </div>`).join('');
  }

  tooltipEl.style.left = `${screenPt.x - containerRect.left}px`;
  tooltipEl.style.top = `${screenPt.y - containerRect.top}px`;
  tooltipEl.style.display = 'block';
}

function hideHistoryTooltip(tooltipEl, cursorEl, dotEls) {
  tooltipEl.style.display = 'none';
  if (cursorEl) cursorEl.style.display = 'none';
  if (dotEls) dotEls.forEach(el => el.style.display = 'none');
}

function svgToScreen(svg, x, y) {
  const ctm = svg.getScreenCTM();
  if (!ctm) {
    const rect = svg.getBoundingClientRect();
    const viewBox = svg.viewBox.baseVal;
    return { x: rect.left + (x / viewBox.width) * rect.width, y: rect.top + (y / viewBox.height) * rect.height };
  }
  const pt = svg.createSVGPoint();
  pt.x = x;
  pt.y = y;
  const screen = pt.matrixTransform(ctm);
  return { x: screen.x, y: screen.y };
}

function screenToSvg(svg, clientX, clientY) {
  const ctm = svg.getScreenCTM();
  if (!ctm) {
    const rect = svg.getBoundingClientRect();
    const viewBox = svg.viewBox.baseVal;
    return { x: (clientX - rect.left) * viewBox.width / rect.width, y: (clientY - rect.top) * viewBox.height / rect.height };
  }
  const pt = svg.createSVGPoint();
  pt.x = clientX;
  pt.y = clientY;
  const inv = pt.matrixTransform(ctm.inverse());
  return { x: inv.x, y: inv.y };
}

function handleHistoryHover(event, svg, tooltipEl, cursorEl, dotEls, points, normalizedModels, dates, width, height, padX, padY) {
  const svgPt = screenToSvg(svg, event.clientX, event.clientY);
  const mouseX = svgPt.x;

  if (mouseX < padX || mouseX > width - padX) {
    hideHistoryTooltip(tooltipEl, cursorEl, dotEls);
    return;
  }

  const plotWidth = width - padX * 2;
  const n = points.length;
  let nearestIdx = 0;
  if (n === 1) {
    nearestIdx = 0;
  } else {
    const ratio = (mouseX - padX) / plotWidth;
    nearestIdx = Math.max(0, Math.min(n - 1, Math.round(ratio * (n - 1))));
  }

  const point = points[nearestIdx];

  if (cursorEl) {
    cursorEl.setAttribute('x1', point.x.toFixed(1));
    cursorEl.setAttribute('x2', point.x.toFixed(1));
    cursorEl.style.display = 'block';
  }
  if (dotEls) {
    dotEls.forEach((el, i) => {
      const model = normalizedModels[i];
      if (!model) { el.style.display = 'none'; return; }
      const v = model.tokens_usage[nearestIdx];
      if (v > 0) {
        const modelY = height - padY - ((v / Math.max(1, ...normalizedModels.flatMap(m => m.tokens_usage))) * (height - padY * 2));
        el.setAttribute('cx', point.x.toFixed(1));
        el.setAttribute('cy', modelY.toFixed(1));
        el.setAttribute('fill', model.color);
        el.style.display = 'block';
      } else {
        el.style.display = 'none';
      }
    });
  }

  showHistoryTooltip(svg, tooltipEl, nearestIdx, points, normalizedModels, dates);
}

function renderHistoryView(data) {
  const history = data.history_usage;
  const dates = history && Array.isArray(history.x_time) ? history.x_time : [];
  const models = history && Array.isArray(history.models) ? history.models : [];
  const visibleModels = models.filter(m => Number(m.total_tokens || 0) > 0 || normalizeSeries(m.tokens_usage, dates.length).some(v => v > 0));

  if (!history || !dates.length || !visibleModels.length) {
    return `<div class="empty-history">暂无近 30 天历史数据</div>`;
  }

  const width = 520;
  const height = 180;
  const padX = 24;
  const padY = 18;
  const normalizedModels = visibleModels.map((model, idx) => ({
    ...model,
    color: HISTORY_COLORS[idx % HISTORY_COLORS.length],
    tokens_usage: normalizeSeries(model.tokens_usage, dates.length),
  }));
  const maxValue = Math.max(1, ...normalizedModels.flatMap(m => m.tokens_usage));
  const points = buildHistoryPointCoords(normalizedModels[0].tokens_usage, maxValue, width, height, padX, padY);
  const lines = normalizedModels.map(model => `
    <polyline class="history-line" stroke="${model.color}" points="${buildPolyline(model.tokens_usage, maxValue, width, height, padX, padY)}"></polyline>
  `).join('');
  const dots = normalizedModels.map((model, i) => `<circle class="history-cursor-dot" data-idx="${i}" data-model="${model.model_name}" cx="0" cy="0" r="3" fill="${model.color}" style="display:none"></circle>`).join('');
  const modelRows = normalizedModels.map(model => {
    const calls = model.total_calls === null || model.total_calls === undefined
      ? ''
      : ` · ${formatCount(model.total_calls)} 次`;
    return `<div class="history-model-row">
      <span class="history-model-name"><span class="history-dot" style="background:${model.color}"></span><span>${model.model_name}</span></span>
      <span>${formatTokens(model.total_tokens)} tokens${calls}</span>
    </div>`;
  }).join('');

  const chartId = `history-chart-${data.provider.replace(/[^a-zA-Z0-9]/g, '')}`;
  return `
    <div class="history-summary">近 30 天：${formatTokens(history.total_tokens)} tokens · ${formatCount(history.total_calls)} 次调用</div>
    <div class="history-chart" data-history-chart="${data.provider}" id="${chartId}">
      <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="近 30 天模型 token 用量折线图" style="width:100%;height:100%;">
        <line class="history-grid-line" x1="${padX}" y1="${padY}" x2="${width - padX}" y2="${padY}"></line>
        <line class="history-grid-line" x1="${padX}" y1="${height / 2}" x2="${width - padX}" y2="${height / 2}"></line>
        <line class="history-axis" x1="${padX}" y1="${height - padY}" x2="${width - padX}" y2="${height - padY}"></line>
        ${lines}
        <line class="history-cursor" data-history-cursor x1="0" y1="${padY}" x2="0" y2="${height - padY}" style="display:none"></line>
        ${dots}
      </svg>
      <div class="history-tooltip" data-history-tooltip></div>
    </div>
    <div>${modelRows}</div>`;
}

function renderHeader(data, subtitle) {
  const canToggle = hasHistoryUsage(data);
  const mode = cardViewModes[data.provider] || 'usage';
  const toggle = canToggle
    ? `<button class="view-toggle" data-view-toggle="${data.provider}" onclick="toggleCardView('${data.provider.replace(/'/g, "\\'")}')">${mode === 'history' ? '用量' : '历史'}</button>`
    : '';
  const right = subtitle || toggle
    ? `<span class="card-header-right">${subtitle ? `<span class="card-subtitle">${subtitle}</span>` : ''}${toggle}</span>`
    : '';
  return `<div class="card-header"><span class="card-title">${data.provider}</span>${right}</div>`;
}

function renderGrid(data) {
  const grid = document.getElementById('grid');
  grid.innerHTML = data.map(renderCard).join('');
  grid.style.display = 'grid';
  bindHistoryCharts();
}

function bindHistoryCharts() {
  const charts = document.querySelectorAll('[data-history-chart]');
  charts.forEach(chartEl => {
    const provider = chartEl.getAttribute('data-history-chart');
    const data = latestUsageData.find(d => d.provider === provider);
    if (!data || !data.history_usage) return;

    const history = data.history_usage;
    const dates = history.x_time || [];
    const models = history.models || [];
    const visibleModels = models.filter(m => Number(m.total_tokens || 0) > 0 || normalizeSeries(m.tokens_usage, dates.length).some(v => v > 0));
    if (!dates.length || !visibleModels.length) return;

    const width = 520;
    const height = 180;
    const padX = 24;
    const padY = 18;
    const normalizedModels = visibleModels.map((model, idx) => ({
      ...model,
      color: HISTORY_COLORS[idx % HISTORY_COLORS.length],
      tokens_usage: normalizeSeries(model.tokens_usage, dates.length),
    }));
    const maxValue = Math.max(1, ...normalizedModels.flatMap(m => m.tokens_usage));
    const points = buildHistoryPointCoords(normalizedModels[0].tokens_usage, maxValue, width, height, padX, padY);

    const tooltipEl = chartEl.querySelector('[data-history-tooltip]');
    const cursorEl = chartEl.querySelector('[data-history-cursor]');
    const dotEls = Array.from(chartEl.querySelectorAll('.history-cursor-dot'));
    const svg = chartEl.querySelector('svg');

    chartEl.addEventListener('mousemove', (event) => {
      handleHistoryHover(event, svg, tooltipEl, cursorEl, dotEls, points, normalizedModels, dates, width, height, padX, padY);
    });
    chartEl.addEventListener('mouseleave', () => {
      hideHistoryTooltip(tooltipEl, cursorEl, dotEls);
    });
  });
}

function toggleCardView(provider) {
  cardViewModes[provider] = cardViewModes[provider] === 'history' ? 'usage' : 'history';
  renderGrid(latestUsageData);
}

function formatTokens(n) {
  return (n / 1000000).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' M';
}

function renderCard(data) {
  if (data.error) {
    return `
      <div class="card">
        <div class="card-header">
          <span class="card-title">${data.provider}</span>
        </div>
        <div class="limit-meta">${data.error}</div>
      </div>`;
  }

  // Card with model_stats (e.g. Codex)
  if (data.model_stats && data.model_stats.length > 0) {
    const limit = data.limits[0];
    const pct = limit ? (parseFloat(limit.used) / parseFloat(limit.limit) * 100) : 0;
    const usedStr = limit ? `$${parseFloat(limit.used).toFixed(2)}` : '';
    const limitStr = limit ? `$${parseFloat(limit.limit).toFixed(2)}` : '';

    const balanceRows = Object.entries(data.balances || {}).map(([key, val]) =>
      `<div class="balance-row"><span>${key}</span><span>${val}</span></div>`
    ).join('');

    const modelRows = data.model_stats.map(m =>
      `<div class="balance-row">
        <span>${m.model}</span>
        <span>${formatTokens(m.total_tokens)} tokens · ${m.requests.toLocaleString()} 次</span>
      </div>`
    ).join('');

    return `
      <div class="card">
        ${renderHeader(data, '')}
        ${balanceRows}
        <div class="limit-row" style="margin-top:0.75rem;">
          <div class="limit-label">
            <span>余额使用 (${usedStr} / ${limitStr})</span>
            <span>${pct.toFixed(1)}%</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill ${barClass(pct)}" style="width:${Math.min(pct, 100)}%"></div>
          </div>
        </div>
        <div style="margin-top:1rem;padding-top:0.75rem;border-top:1px solid #334155;">
          ${modelRows}
        </div>
      </div>`;
  }

  // Balance card (no rate limits, just balances)
  if (data.balances && Object.keys(data.balances).length > 0 && !data.limits.length) {
    const subtitle = data.membership_level || data.user_id || '';
    const balanceRows = Object.entries(data.balances).map(([key, val]) => {
      const label = BALANCE_LABELS[key] || key;
      const formattedValue = MONEY_BALANCE_KEYS.has(key) ? `¥${val}` : val;
      return `<div class="balance-row"><span>${label}</span><span>${formattedValue}</span></div>`;
    }).join('');

    return `
      <div class="card">
        ${renderHeader(data, subtitle)}
        ${balanceRows}
      </div>`;
  }

  // Rate-limit card
  const limitsHtml = data.limits.map(l => {
    let pct, pctStr, barWidth;
    if (l.limit_type === 'PERCENT') {
      pct = parseFloat(l.used);
      pctStr = `${pct.toFixed(2)}%`;
      barWidth = Math.min(pct, 100);
    } else {
      pct = l.limit ? Math.round(parseInt(l.used) * 100 / parseInt(l.limit)) : null;
      const usedNum = parseInt(l.used);
      const limitNum = parseInt(l.limit);
      const showCount = limitNum > 200;
      pctStr = pct !== null ? `${pct}%` : `${l.used}/${l.limit}`;
      const countStr = showCount ? `${usedNum.toLocaleString()} / ${limitNum.toLocaleString()} 次` : '';
      if (showCount) pctStr = countStr;
      barWidth = pct !== null ? pct : 0;
    }
    const detailsHtml = l.usage_details.length
      ? l.usage_details.map(d =>
          `<div class="detail-row"><span>${d.model_code}</span><span>${d.usage}</span></div>`
        ).join('')
      : '';

    return `
      <div class="limit-row">
        <div class="limit-label">
          <span>${l.limit_type === 'PERCENT' ? l.time_unit : formatTimeWindow(l)}</span>
          <span>${pctStr}</span>
        </div>
        <div class="bar-bg">
          <div class="bar-fill ${barClass(pct || 0)}" style="width:${barWidth}%"></div>
        </div>
        ${l.reset_time ? `<div class="limit-meta">${formatReset(l.reset_time)}</div>` : ''}
        ${detailsHtml ? `<div style="margin-top:0.5rem">${detailsHtml}</div>` : ''}
      </div>`;
  }).join('');

  const subtitle = data.membership_level || data.user_id || '';

  const balancesHtml = data.balances && Object.keys(data.balances).length
    ? '<div style="margin-top:1rem;padding-top:0.75rem;border-top:1px solid #334155;">'
      + Object.entries(data.balances).map(([key, val]) => {
          const label = BALANCE_LABELS[key] || key;
          const formattedValue = MONEY_BALANCE_KEYS.has(key) ? `¥${val}` : val;
          return `<div class="balance-row"><span>${label}</span><span>${formattedValue}</span></div>`;
        }).join('')
      + '</div>'
    : '';

  const tokenUsageHtml = data.token_usage && data.token_usage.length
    ? '<div style="margin-top:1rem;padding-top:0.75rem;border-top:1px solid #334155;">'
      + data.token_usage.map(t =>
          `<div class="balance-row"><span>${TOKEN_PERIOD_LABELS[t.period] || t.period}</span><span>${formatTokens(t.total_tokens)} tokens · ${t.total_calls.toLocaleString()} 次</span></div>`
        ).join('')
      + '</div>'
    : '';

  return `
    <div class="card">
      ${renderHeader(data, subtitle)}
      ${hasHistoryUsage(data) && cardViewModes[data.provider] === 'history'
        ? renderHistoryView(data)
        : `${limitsHtml}${balancesHtml}${tokenUsageHtml}`}
    </div>`;
}

async function refresh() {
  try {
    const [data, status] = await Promise.all([
      fetch('/api/usage').then(r => r.json()),
      fetch('/api/status').then(r => r.json()),
    ]);

    latestUsageData = data;
    renderGrid(latestUsageData);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('updated').textContent =
      status.last_updated ? `最后更新：${status.last_updated}` : '';
  } catch (e) {
    document.getElementById('loading').textContent = `加载失败：${e.message}`;
  }
}

refresh();
setInterval(refresh, 60000);
</script>
</body>
</html>
