<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Plan Insight</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.25rem 0.75rem;
    overflow-x: hidden;
  }
  h1 { font-size: 1.35rem; margin-bottom: 0.25rem; }
  .updated { font-size: 0.8rem; color: #64748b; margin-bottom: 2rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1rem;
    width: 100%;
    /* 容器宽度上限：4×280 + 3×1.5rem(gap) ≈ 1192px，恰好容纳 4 列、
       放不下第 5 列，从而让 auto-fit 在宽屏自动排到最多 4 列 */
    max-width: 1200px;
  }
  .card {
    background: #1e293b;
    border-radius: 12px;
    padding: 1.25rem;
    border: 1px solid #334155;
    overflow: hidden;
  }
  @media (min-width: 640px) {
    body { padding: 2rem 1rem; }
    h1 { font-size: 1.5rem; }
    .grid { gap: 1.5rem; }
    .card { padding: 1.5rem; }
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.25rem;
  }
  .card-title-group {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    min-width: 0;
  }
  .card-title {
    font-size: 1.15rem;
    font-weight: 600;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-type-label {
    font-size: 0.78rem;
    color: #94a3b8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-subtitle { font-size: 0.8rem; color: #94a3b8; }
  .card-header-right {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
  }
  .view-toggle {
    border: 1px solid #475569;
    background: #0f172a;
    color: #cbd5e1;
    border-radius: 999px;
    padding: 0.15rem 0.5rem;
    font-size: 0.72rem;
    cursor: pointer;
  }
  .view-toggle:hover { border-color: #38bdf8; color: #e0f2fe; }
  .history-summary {
    font-size: 0.9rem;
    color: #cbd5e1;
    margin-bottom: 0.75rem;
  }
  .history-chart {
    width: 100%;
    height: 180px;
    margin-bottom: 0.75rem;
    position: relative;
    touch-action: pan-y;
  }
  .history-axis { stroke: #334155; stroke-width: 1; }
  .history-grid-line { stroke: #273449; stroke-width: 1; }
  .history-line { fill: none; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  .history-cursor {
    stroke: #94a3b8;
    stroke-width: 1;
    stroke-dasharray: 3 3;
    pointer-events: none;
  }
  .history-cursor-dot {
    r: 3;
    pointer-events: none;
  }
  .history-tooltip {
    position: absolute;
    pointer-events: none;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 0.5rem 0.65rem;
    font-size: 0.78rem;
    color: #e2e8f0;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
    transform: translate(-50%, calc(-100% - 8px));
    white-space: nowrap;
    z-index: 10;
    display: none;
  }
  .history-tooltip-date {
    font-weight: 600;
    margin-bottom: 0.3rem;
    color: #f1f5f9;
  }
  .history-tooltip-row {
    display: flex;
    justify-content: space-between;
    gap: 0.85rem;
    align-items: center;
    padding: 0.12rem 0;
  }
  .history-tooltip-model {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    color: #cbd5e1;
  }
  .history-tooltip-tokens {
    font-variant-numeric: tabular-nums;
    color: #e2e8f0;
  }
  .history-model-row {
    display: flex;
    justify-content: space-between;
    gap: 0.75rem;
    font-size: 0.8rem;
    padding: 0.28rem 0;
    color: #cbd5e1;
    border-bottom: 1px solid #334155;
  }
  .history-model-row:last-child { border-bottom: none; }
  .history-model-name {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    min-width: 0;
  }
  .history-model-name span:last-child {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-dot {
    width: 0.55rem;
    height: 0.55rem;
    border-radius: 999px;
    flex: 0 0 auto;
  }
  .empty-history {
    color: #64748b;
    font-size: 0.85rem;
    padding: 1.5rem 0;
    text-align: center;
  }
  .limit-row { margin-bottom: 1rem; }
  .balance-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid #334155;
  }
  .balance-row:last-child { border-bottom: none; }
  .balance-row span:last-child {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .limit-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    margin-bottom: 0.35rem;
    color: #94a3b8;
  }
  .bar-bg {
    height: 8px;
    background: #334155;
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;

  }
  .bar-fill.low { background: #22c55e; }
  .bar-fill.mid { background: #eab308; }
  .bar-fill.high { background: #ef4444; }
  .limit-meta {
    font-size: 0.75rem;
    color: #64748b;

  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    padding: 0.2rem 0;
    color: #cbd5e1;
    margin-left: 0.5rem;
  }
  .error-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 1.5rem;
    border: 1px solid #7f1d1d;
    color: #fca5a5;
  }
  #loading { color: #64748b; }
  .tab-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .tab {
    border: 1px solid #334155;
    background: #1e293b;
    color: #94a3b8;
    border-radius: 8px;

  }
  @media (min-width: 640px) {

  .tab:hover { border-color: #475569; color: #cbd5e1; }

    display: flex;
    justify-content: space-between;

  }

  .range-pill.active {
    border-color: #38bdf8;
    background: #38bdf8;

  }
  .range-total {
    font-size: 0.78rem;
    color: #94a3b8;
  }

    font-weight: 600;
    margin-left: 0.3rem;
  }

  #usage-chart-view {
    width: 100%;

  }

    border: 1px solid #475569;

  }

  }
  .empty-usage {

  .usage-tooltip {
    position: absolute;
    pointer-events: none;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 0.5rem 0.65rem;
    font-size: 0.78rem;
    color: #e2e8f0;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
    transform: translate(-50%, calc(-100% - 8px));
    white-space: nowrap;
    z-index: 20;
    display: none;
  }
  .usage-tooltip-date { font-weight: 600; margin-bottom: 0.3rem; color: #f1f5f9; }
  .usage-tooltip-row {
    display: flex;
    justify-content: space-between;
    gap: 0.85rem;
    align-items: center;
    padding: 0.12rem 0;
  }
  .usage-tooltip-model {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    color: #cbd5e1;
  }
  .usage-tooltip-tokens { font-variant-numeric: tabular-nums; color: #e2e8f0; }
  #usage-table-container { margin-top: 1.25rem; }
  @media (min-width: 640px) {
    #usage-table-container { margin-top: 1.5rem; }
  }
  .usage-table-wrap {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .usage-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.86rem;
  }
  .usage-table th, .usage-table td {
    padding: 0.6rem 0.9rem;
    text-align: right;
    border-bottom: 1px solid #334155;
    white-space: nowrap;
  }
  /* Mobile: hide the per-token breakdown columns, keep only model + total */
  .usage-table th.col-detail, .usage-table td.col-detail { display: none; }
  /* USD equivalent-value column: also hidden on mobile */
  .usage-table th.col-cost, .usage-table td.col-cost { display: none; }
  .usage-table th {
    color: #94a3b8;
    font-weight: 600;
    background: #0f172a;
    text-align: right;
  }
  .usage-table th.col-model {
    text-align: left;
    background: #0f172a;
  }
  .usage-table td.col-model {

  }
  .usage-table tbody tr:last-child td { border-bottom: none; }
  .usage-table tbody tr:hover { background: #243349; }
  .usage-table td.num, .usage-table th.num { font-variant-numeric: tabular-nums; }
  .usage-table-model-cell {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    max-width: 16rem;
  }
  .usage-table-swatch {
    width: 0.65rem;
    height: 0.65rem;
    border-radius: 2px;
    flex: 0 0 auto;
  }
  .usage-table-label {
    overflow: hidden;

  }
  @media (min-width: 640px) {

    /* Desktop: show all columns including the per-token breakdown */

  }

  .usage-pagination-pages {

  }

</head>
<body>
  <h1>AI Plan Insight</h1>
  <div class="tab-bar">
    <button class="tab active" data-tab="balance">订阅余额</button>
    <button class="tab" data-tab="usage">模型用量</button>
  </div>
  <div class="updated" id="updated">加载中...</div>
  <div id="loading">正在获取数据...</div>
  <div class="grid" id="grid" style="display:none;"></div>
  <div id="usage-chart-view" style="display:none;">
    <div class="range-pills" id="range-pills">
      <div class="range-pill-group">
        <button class="range-pill" data-range="90">90天</button>
        <button class="range-pill" data-range="30">30天</button>
        <button class="range-pill" data-range="7">7天</button>
      </div>
      <div class="range-total" id="range-total">总用量：<strong>-</strong></div>
    </div>
    <div id="usage-chart-container"></div>
    <div id="usage-table-container"></div>
    <div id="stale-sources-container"></div>
  </div>

<script>
const TIME_UNIT_LABELS = {
  second: '秒', minute: '分钟', hour: '小时',
  day: '天', week: '周', month: '月', year: '年',
  tokens_limit: '模型调用',
};

const TAB_KEY = 'ai-plan-insight:tab';
let activeTab = localStorage.getItem(TAB_KEY) || 'balance';

async function initTabs() {
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => applyTab(btn.getAttribute('data-tab')));
  });
  applyTab(activeTab);
}

function applyTab(tab) {
  const validTabs = ['balance', 'usage'];
  if (!validTabs.includes(tab)) tab = 'balance';
  activeTab = tab;
  localStorage.setItem(TAB_KEY, tab);
  document.querySelectorAll('.tab').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-tab') === tab);
  });
  const grid = document.getElementById('grid');
  const usageView = document.getElementById('usage-chart-view');
  grid.style.display = (tab === 'balance') ? 'grid' : 'none';
  usageView.style.display = (tab === 'usage') ? 'block' : 'none';
  if (tab === 'balance') refreshV2();
  else if (tab === 'usage') refreshUsageChart();
}

initTabs();

const RANGE_KEY = 'ai-plan-insight:usage-range';
let usageRange = Number(localStorage.getItem(RANGE_KEY)) || 90;

const TABLE_PAGE_SIZE_KEY = 'ai-plan-insight:usage-table-page-size';
const TABLE_PAGE_SIZES = [10, 20, 50, 100];
let tablePageSize = Number(localStorage.getItem(TABLE_PAGE_SIZE_KEY)) || 10;
if (!TABLE_PAGE_SIZES.includes(tablePageSize)) tablePageSize = 10;
let tableCurrentPage = 1;
let tableAllModels = [];

function applyUsageRange(range) {
  usageRange = range;
  localStorage.setItem(RANGE_KEY, String(range));
  document.querySelectorAll('.range-pill').forEach(btn => {
    btn.classList.toggle('active', Number(btn.getAttribute('data-range')) === range);
  });
  refreshUsageChart();
}

document.querySelectorAll('.range-pill').forEach(btn => {
  btn.addEventListener('click', () => applyUsageRange(Number(btn.getAttribute('data-range'))));
});

applyUsageRange(usageRange);

const USAGE_COLORS = ['#38bdf8', '#f59e0b', '#34d399', '#f472b6', '#a78bfa', '#fbbf24', '#22d3ee', '#fb7185'];
const USAGE_OTHER_COLOR = '#64748b';
let lastUsageModels = [];  // [{label,color,...}] from the most recent fetch
let lastUsageData = null;  // raw payload from the most recent fetch, for re-render on resize

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

function formatUsageDate(label) {
  const parts = String(label || '').split('-');
  if (parts.length === 3) return `${parts[1]}月${parts[2]}日`;
  return String(label);
}

function renderUsageChart(data) {
  const container = document.getElementById('usage-chart-container');
  const tableContainer = document.getElementById('usage-table-container');
  const totalEl = document.getElementById('range-total');
  if (data) lastUsageData = data;
  tableAllModels = (data && Array.isArray(data.all_models)) ? data.all_models : [];
  tableCurrentPage = 1;
  if (!data || !data.days || data.days.length === 0) {
    container.innerHTML = '<div class="empty-usage">暂无用量数据</div>';
    if (tableContainer) tableContainer.innerHTML = '';
    if (totalEl) totalEl.innerHTML = '总用量：<strong>-</strong>';
    return;
  }

  const days = data.days;
  const modelSummary = data.models;
  lastUsageModels = modelSummary;

  // Calculate grand total across all days and models
  const grandTotal = modelSummary.reduce((sum, m) => sum + (m.grand_total || 0), 0);
  // USD equivalent: sum priced models; flag partial when any token-bearing
  // model was unpriced (cost_usd null) or any model reports cost_partial.
  let grandCost = 0, costPartial = false, hasAnyCost = false;
  modelSummary.forEach(m => {
    if (m.cost_usd != null) { grandCost += m.cost_usd; hasAnyCost = true; }
    else if (m.grand_total) costPartial = true;
    if (m.cost_partial) costPartial = true;
  });
  const costStr = hasAnyCost
    ? `（等额价值 <strong>${formatUsd(grandCost)}</strong>${costPartial ? '<sup title="部分原始模型缺少价格数据，此为已知价格部分的合计">*</sup>' : ''}）`
    : '';
  if (totalEl) totalEl.innerHTML = `总用量：<strong>${formatTokens(grandTotal)}</strong> ${costStr}`;

  const colorByLabel = {};
  modelSummary.forEach(m => { colorByLabel[m.label] = m.color; });

  const W = 1000, H = 400;
  // On mobile the Y-axis labels are scaled up (font-size 18px in SVG units),
  // so widen the left padding to keep "1.25 M" from colliding with the axis.
  const isMobile = window.innerWidth < 640;
  const padL = isMobile ? 132 : 86, padR = 16, padT = 16, padB = 44;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const baseY = H - padB;

  const dailyTotals = days.map(d => d.models.reduce((s, m) => s + m.total, 0));
  const maxTotal = Math.max(...dailyTotals, 1);

  const n = days.length;
  const slot = plotW / n;
  const barW = Math.min(slot * 0.7, 44);

  // Y gridlines + value labels
  const steps = 4;
  let gridSvg = '';
  for (let i = 0; i <= steps; i++) {
    const val = (maxTotal / steps) * i;
    const y = baseY - (val / maxTotal) * plotH;
    gridSvg += `<line class="usage-grid" x1="${padL}" y1="${y.toFixed(1)}" x2="${W - padR}" y2="${y.toFixed(1)}"/>`;
    gridSvg += `<text class="usage-axis-text" x="${padL - 8}" y="${(y + 3).toFixed(1)}" text-anchor="end">${formatTokens(val)}</text>`;
  }

  // Stacked bars + hover capture + X labels
  const labelEvery = n > 60 ? 7 : (n > 10 ? 3 : 1);
  let barsSvg = '';
  days.forEach((day, idx) => {
    const cx = padL + slot * idx + slot / 2;
    const x = cx - barW / 2;
    let cursor = baseY;
    const present = modelSummary
      .map(m => {
        const dayModel = day.models.find(dm => dm.label === m.label);
        return dayModel ? { ...dayModel, color: m.color } : null;
      })
      .filter(Boolean);
    present.forEach(m => {
      const h = (m.total / maxTotal) * plotH;
      const y = cursor - h;
      const segmentColor = m.color || colorByLabel[m.label] || USAGE_OTHER_COLOR;
      barsSvg += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" fill="${segmentColor}"/>`;
      cursor = y;
    });
    barsSvg += `<rect class="usage-hover" data-idx="${idx}" x="${(padL + slot * idx).toFixed(1)}" y="${padT}" width="${slot.toFixed(1)}" height="${plotH}" fill="transparent"/>`;
    if (idx % labelEvery === 0) {
      barsSvg += `<text class="usage-axis-text" x="${cx.toFixed(1)}" y="${(baseY + 18).toFixed(1)}" text-anchor="middle">${formatUsageDate(day.date)}</text>`;
    }
  });

  // Legend below the chart, kept outside the SVG so it never covers bars.
  let legendHtml = '';
  modelSummary.forEach((m, i) => {
    legendHtml += `<div class="usage-legend-item">
      <span class="usage-legend-swatch" style="background:${m.color}"></span>
      <span class="usage-legend-label">${escapeHtml(m.label)}</span>
      <span class="usage-legend-share">${Number(m.share_pct || 0).toFixed(1)}%</span>
    </div>`;
  });

  container.innerHTML = `
<svg id="usage-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;touch-action:pan-y;">
  <line class="usage-axis" x1="${padL}" y1="${baseY}" x2="${W - padR}" y2="${baseY}"/>
  ${gridSvg}
  ${barsSvg}
</svg>
<div class="usage-legend">${legendHtml}</div>
<div class="usage-tooltip" id="usage-tooltip"></div>`;

  // Tooltip wiring: show per-model rows for a given day index.
  const svgEl = document.getElementById('usage-svg');
  const tooltip = document.getElementById('usage-tooltip');

  function showUsageTooltipForDay(idx, clientX, clientY) {
    if (idx < 0 || idx >= days.length) { hideUsageTooltip(); return; }
    const day = days[idx];
    const rows = day.models
      .filter(m => m.total > 0)
      .map(m => `<div class="usage-tooltip-row">
          <span class="usage-tooltip-model"><span class="history-dot" style="background:${colorByLabel[m.label] || USAGE_OTHER_COLOR}"></span><span>${escapeHtml(m.label)}</span></span>
          <span class="usage-tooltip-tokens">输入 ${formatTokens(m.input_tokens)} · 输出 ${formatTokens(m.output_tokens)} · 缓存读 ${formatTokens(m.cache_read_tokens || 0)} · 缓存写 ${formatTokens(m.cache_write_tokens || 0)} · 推理 ${formatTokens(m.reasoning_tokens || 0)} · 共 ${formatTokens(m.total)}</span>
        </div>`).join('');
    tooltip.innerHTML = `<div class="usage-tooltip-date">${formatUsageDate(day.date)}</div>${rows}`;
    const cr = container.getBoundingClientRect();
    let left = clientX - cr.left;
    // Clamp tooltip within container horizontally on narrow screens
    const tooltipWidth = tooltip.offsetWidth || 260;
    left = Math.max(8, Math.min(left, cr.width - tooltipWidth / 2 - 8));
    tooltip.style.left = `${left}px`;
    tooltip.style.top = `${clientY - cr.top}px`;
    tooltip.style.display = 'block';
  }
  function hideUsageTooltip() { tooltip.style.display = 'none'; }

  // Helper: convert clientX to nearest day index using SVG coordinates
  function clientXToDayIdx(clientX) {
    const pt = svgEl.createSVGPoint();
    pt.x = clientX; pt.y = 0;
    const ctm = svgEl.getScreenCTM();
    if (!ctm) return -1;
    const svgPt = pt.matrixTransform(ctm.inverse());
    const mx = svgPt.x;
    if (mx < padL || mx > W - padR) return -1;
    const relX = mx - padL;
    const idx = Math.floor(relX / slot);
    return Math.max(0, Math.min(days.length - 1, idx));
  }

  svgEl.querySelectorAll('.usage-hover').forEach(rect => {
    rect.addEventListener('mousemove', (e) => {
      showUsageTooltipForDay(Number(rect.getAttribute('data-idx')), e.clientX, e.clientY);
    });
    rect.addEventListener('mouseleave', hideUsageTooltip);
  });

  // Touch support for mobile
  svgEl.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    const idx = clientXToDayIdx(t.clientX);
    if (idx >= 0) {
      e.preventDefault();
      showUsageTooltipForDay(idx, t.clientX, t.clientY);
    }
  }, { passive: false });
  svgEl.addEventListener('touchmove', (e) => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    const idx = clientXToDayIdx(t.clientX);
    if (idx >= 0) {
      e.preventDefault();
      showUsageTooltipForDay(idx, t.clientX, t.clientY);
    } else {
      hideUsageTooltip();
    }
  }, { passive: false });
  svgEl.addEventListener('touchend', hideUsageTooltip);
  svgEl.addEventListener('touchcancel', hideUsageTooltip);

  // Tap outside the SVG to dismiss (e.g. when tooltip remains after touch end)
  document.addEventListener('touchstart', (e) => {
    if (!svgEl.contains(e.target) && !tooltip.contains(e.target)) {
      hideUsageTooltip();
    }
  }, { passive: true });

  renderUsageTable();
}

function buildPageNumbers(current, total) {
  // Produce a compact list of page numbers with `null` gaps for ellipses.
  const pages = [];
  if (total <= 7) {
    for (let i = 1; i <= total; i++) pages.push(i);
    return pages;
  }
  pages.push(1);
  const left = Math.max(2, current - 1);
  const right = Math.min(total - 1, current + 1);
  if (left > 2) pages.push(null);
  for (let i = left; i <= right; i++) pages.push(i);
  if (right < total - 1) pages.push(null);
  pages.push(total);
  return pages;
}

function renderUsageTable() {
  const container = document.getElementById('usage-table-container');
  if (!container) return;
  if (!tableAllModels || tableAllModels.length === 0) {
    container.innerHTML = '<div class="usage-table-empty">暂无用量数据</div>';
    return;
  }

  const all = tableAllModels.slice().sort((a, b) => (b.grand_total || 0) - (a.grand_total || 0));
  const total = all.length;
  const size = tablePageSize;
  const totalPages = Math.max(1, Math.ceil(total / size));
  if (tableCurrentPage > totalPages) tableCurrentPage = totalPages;
  if (tableCurrentPage < 1) tableCurrentPage = 1;

  const startIdx = (tableCurrentPage - 1) * size;
  const endIdx = Math.min(startIdx + size, total);
  const pageRows = all.slice(startIdx, endIdx);

  const rowsHtml = pageRows.map(m => {
    const color = m.color || USAGE_OTHER_COLOR;
    return `<tr>
      <td class="col-model"><span class="usage-table-model-cell">
        <span class="usage-table-swatch" style="background:${color}"></span>
        <span class="usage-table-label">${escapeHtml(m.label)}</span>
      </span></td>
      <td class="num col-detail">${formatTokens(m.input_tokens || 0)}</td>
      <td class="num col-detail">${formatTokens(m.output_tokens || 0)}</td>
      <td class="num col-detail">${formatTokens(m.cache_read_tokens || 0)}</td>
      <td class="num col-detail">${formatTokens(m.cache_write_tokens || 0)}</td>
      <td class="num col-detail">${formatTokens(m.reasoning_tokens || 0)}</td>
      <td class="num col-cost"${m.cost_partial ? ' title="部分原始模型缺少价格数据，此为已知价格部分的合计"' : ''}>${formatUsd(m.cost_usd)}</td>
      <td class="num col-total">${formatTokens(m.grand_total || 0)}</td>
    </tr>`;
  }).join('');

  const pages = buildPageNumbers(tableCurrentPage, totalPages);
  let pageBtnsHtml = '';
  pageBtnsHtml += `<button class="usage-page-btn" data-page="prev" ${tableCurrentPage <= 1 ? 'disabled' : ''}>上一页</button>`;
  pages.forEach(p => {
    if (p === null) {
      pageBtnsHtml += `<span class="usage-page-ellipsis">...</span>`;
    } else {
      pageBtnsHtml += `<button class="usage-page-btn ${p === tableCurrentPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
    }
  });
  pageBtnsHtml += `<button class="usage-page-btn" data-page="next" ${tableCurrentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;

  const sizeOptions = TABLE_PAGE_SIZES.map(s =>
    `<option value="${s}" ${s === size ? 'selected' : ''}>${s} / 页</option>`
  ).join('');

  container.innerHTML = `
<div class="usage-table-wrap">
  <table class="usage-table">
    <thead>
      <tr>
        <th class="col-model">模型名</th>
        <th class="num col-detail">输入 token</th>
        <th class="num col-detail">输出 token</th>
        <th class="num col-detail">缓存读</th>
        <th class="num col-detail">缓存写</th>
        <th class="num col-detail">推理</th>
        <th class="num col-cost">等额价值</th>
        <th class="num col-total">总计</th>
      </tr>
    </thead>
    <tbody>${rowsHtml}</tbody>
  </table>
</div>
<div class="usage-pagination">
  <span class="usage-pagination-info">第 ${startIdx + 1}-${endIdx} 条，共 ${total} 个模型</span>
  <span class="usage-pagination-pages">${pageBtnsHtml}</span>
  <span class="usage-page-size">
    <select class="usage-page-size-select" id="usage-page-size-select">${sizeOptions}</select>
  </span>
</div>`;

  container.querySelectorAll('.usage-page-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      const target = btn.getAttribute('data-page');
      if (target === 'prev') tableCurrentPage = Math.max(1, tableCurrentPage - 1);
      else if (target === 'next') tableCurrentPage = Math.min(totalPages, tableCurrentPage + 1);
      else tableCurrentPage = Number(target);
      renderUsageTable();
    });
  });
  const sizeSelect = document.getElementById('usage-page-size-select');
  if (sizeSelect) {
    sizeSelect.addEventListener('change', () => {
      const v = Number(sizeSelect.value);
      if (!TABLE_PAGE_SIZES.includes(v)) return;
      tablePageSize = v;
      localStorage.setItem(TABLE_PAGE_SIZE_KEY, String(v));
      tableCurrentPage = 1;
      renderUsageTable();
    });
  }
}

async function refreshUsageChart() {
  const container = document.getElementById('usage-chart-container');
  refreshStaleSources();
  // The global header placeholders are only cleared by the balance-tab
  // refresh paths; when the page loads straight into the usage tab this is
  // the only fetch that runs, so it must resolve them too.
  const statusPromise = fetch('/api/status/v2').then(r => r.json()).catch(() => null);
  try {
    const resp = await fetch(`/api/usage/timeseries?days=${usageRange}`);
    const data = await resp.json();
    renderUsageChart(data);
    document.getElementById('loading').style.display = 'none';
    const status = await statusPromise;
    document.getElementById('updated').textContent =
      status && status.last_updated ? `最后更新：${status.last_updated}` : '';
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    if (container) container.innerHTML = `<div class="empty-usage">加载失败：${escapeHtml(e.message)}</div>`;
  }
}

function renderStaleSources(sources) {
  const container = document.getElementById('stale-sources-container');
  if (!container) return;
  if (!Array.isArray(sources) || sources.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = sources.map(s => {
    const name = s.label || s.source_id;
    const seen = new Date(s.last_seen);
    const silentDays = Math.max(1, Math.floor((Date.now() - seen.getTime()) / 86400000));
    const seenText = isNaN(seen.getTime()) ? '' :
      `（最后上报：${seen.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' })} ${seen.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}）`;
    return `
<div class="stale-alert">
  <span class="stale-alert-text">⚠️ 设备「${escapeHtml(name)}」已超过 ${silentDays} 天未上传数据<span class="stale-last-seen">${seenText}</span>，推送 Agent 可能已停止工作</span>
  <button class="stale-dismiss-btn" data-source-id="${escapeHtml(s.source_id)}">不再提示</button>
</div>`;
  }).join('');

  container.querySelectorAll('.stale-dismiss-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      btn.disabled = true;
      try {
        const resp = await fetch(`/api/sources/${encodeURIComponent(btn.getAttribute('data-source-id'))}/dismiss-stale`, { method: 'POST' });
        if (resp.ok) btn.closest('.stale-alert').remove();
        else btn.disabled = false;
      } catch (e) {
        btn.disabled = false;
      }
    });
  });
}

async function refreshStaleSources() {
  try {
    const resp = await fetch('/api/sources/stale');
    renderStaleSources(await resp.json());
  } catch (e) {
    // Liveness alert is best-effort; never disturb the usage page.
    renderStaleSources([]);
  }
}

function formatTimeWindow(l) {
  const key = l.time_unit.toLowerCase();
  if (key === 'tokens_limit') return '模型调用';
  const label = TIME_UNIT_LABELS[key] || l.time_unit;
  const window = `${l.duration} ${label}`;
  if (l.limit_type === 'TIME_LIMIT') return `${window} MCP 调用数量`;
  return window;
}

function formatReset(resetTime) {
  if (!resetTime) return '';
  const dt = new Date(resetTime);
  const now = new Date();
  const isToday = dt.toDateString() === now.toDateString();
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate() + 1);
  const isTomorrow = dt.toDateString() === tomorrow.toDateString();

  const time = dt.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  if (isToday) return `${time} 重置`;
  if (isTomorrow) return `明天 ${time} 重置`;
  return `${dt.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' })} ${time} 重置`;
}

function barClass(pct) {

const HISTORY_COLORS = ['#38bdf8', '#a78bfa', '#34d399', '#f59e0b', '#fb7185', '#e879f9'];
const cardViewModes = {};

function hasHistoryUsage(data) {
  return GLM_HISTORY_PROVIDERS.has(data.provider) && data.history_usage;
}

function formatCount(n) {
  return Number(n || 0).toLocaleString('en-US');
}

function normalizeSeries(values, length) {
  const source = Array.isArray(values) ? values : [];
  const result = source.slice(0, length).map(v => Number(v || 0));
  while (result.length < length) result.push(0);
  return result;
}

function buildPolyline(values, maxValue, width, height, padX, padY) {
  if (!values.length) return '';
  const plotWidth = width - padX * 2;
  const plotHeight = height - padY * 2;
  return values.map((value, idx) => {
    const x = values.length === 1 ? width / 2 : padX + (idx * plotWidth / (values.length - 1));
    const y = height - padY - ((value / maxValue) * plotHeight);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
}

function buildHistoryPointCoords(values, maxValue, width, height, padX, padY) {
  const plotWidth = width - padX * 2;
  const plotHeight = height - padY * 2;
  return values.map((value, idx) => {
    const x = values.length === 1 ? width / 2 : padX + (idx * plotWidth / (values.length - 1));
    const y = height - padY - ((value / maxValue) * plotHeight);
    return { x, y, value, idx };
  });
}

function formatHistoryDate(label) {
  if (!label) return '';
  const parts = String(label).split('-');
  if (parts.length === 3) return `${parts[1]}月${parts[2]}日`;
  return String(label);
}

function showHistoryTooltip(svg, tooltipEl, idx, points, normalizedModels, dates) {
  if (idx < 0 || idx >= dates.length) return;
  const point = points[idx];
  const containerRect = tooltipEl.parentElement.getBoundingClientRect();
  const screenPt = svgToScreen(svg, point.x, point.y);

  const rows = normalizedModels
    .map(m => ({ name: m.model_name, color: m.color, value: m.tokens_usage[idx] }))
    .filter(row => row.value > 0);

  if (!rows.length) {
    tooltipEl.innerHTML = `<div class="history-tooltip-date">${formatHistoryDate(dates[idx])}</div><div class="history-tooltip-row"><span class="history-tooltip-tokens" style="color:#64748b">无用量</span></div>`;
  } else {
    tooltipEl.innerHTML = `<div class="history-tooltip-date">${formatHistoryDate(dates[idx])}</div>`
      + rows.map(row => `
        <div class="history-tooltip-row">
          <span class="history-tooltip-model"><span class="history-dot" style="background:${row.color}"></span><span>${row.name}</span></span>
          <span class="history-tooltip-tokens">${formatTokens(row.value)} tokens</span>
        </div>`).join('');
  }

  tooltipEl.style.left = `${screenPt.x - containerRect.left}px`;
  tooltipEl.style.top = `${screenPt.y - containerRect.top}px`;
  tooltipEl.style.display = 'block';
}

function hideHistoryTooltip(tooltipEl, cursorEl, dotEls) {
  tooltipEl.style.display = 'none';
  if (cursorEl) cursorEl.style.display = 'none';
  if (dotEls) dotEls.forEach(el => el.style.display = 'none');
}

function svgToScreen(svg, x, y) {
  const ctm = svg.getScreenCTM();
  if (!ctm) {
    const rect = svg.getBoundingClientRect();
    const viewBox = svg.viewBox.baseVal;
    return { x: rect.left + (x / viewBox.width) * rect.width, y: rect.top + (y / viewBox.height) * rect.height };
  }
  const pt = svg.createSVGPoint();
  pt.x = x;
  pt.y = y;
  const screen = pt.matrixTransform(ctm);
  return { x: screen.x, y: screen.y };
}

function screenToSvg(svg, clientX, clientY) {
  const ctm = svg.getScreenCTM();
  if (!ctm) {
    const rect = svg.getBoundingClientRect();
    const viewBox = svg.viewBox.baseVal;
    return { x: (clientX - rect.left) * viewBox.width / rect.width, y: (clientY - rect.top) * viewBox.height / rect.height };
  }
  const pt = svg.createSVGPoint();
  pt.x = clientX;
  pt.y = clientY;
  const inv = pt.matrixTransform(ctm.inverse());
  return { x: inv.x, y: inv.y };
}

function handleHistoryHover(event, svg, tooltipEl, cursorEl, dotEls, points, normalizedModels, dates, width, height, padX, padY) {
  const svgPt = screenToSvg(svg, event.clientX, event.clientY);
  const mouseX = svgPt.x;

  if (mouseX < padX || mouseX > width - padX) {
    hideHistoryTooltip(tooltipEl, cursorEl, dotEls);
    return;
  }

  const plotWidth = width - padX * 2;
  const n = points.length;
  let nearestIdx = 0;
  if (n === 1) {
    nearestIdx = 0;
  } else {
    const ratio = (mouseX - padX) / plotWidth;
    nearestIdx = Math.max(0, Math.min(n - 1, Math.round(ratio * (n - 1))));
  }

  const point = points[nearestIdx];

  if (cursorEl) {
    cursorEl.setAttribute('x1', point.x.toFixed(1));
    cursorEl.setAttribute('x2', point.x.toFixed(1));
    cursorEl.style.display = 'block';
  }
  if (dotEls) {
    dotEls.forEach((el, i) => {
      const model = normalizedModels[i];
      if (!model) { el.style.display = 'none'; return; }
      const v = model.tokens_usage[nearestIdx];
      if (v > 0) {
        const modelY = height - padY - ((v / Math.max(1, ...normalizedModels.flatMap(m => m.tokens_usage))) * (height - padY * 2));
        el.setAttribute('cx', point.x.toFixed(1));
        el.setAttribute('cy', modelY.toFixed(1));
        el.setAttribute('fill', model.color);
        el.style.display = 'block';
      } else {
        el.style.display = 'none';
      }
    });
  }

  showHistoryTooltip(svg, tooltipEl, nearestIdx, points, normalizedModels, dates);
}

function renderHistoryView(data) {
  const history = data.history_usage;
  const dates = history && Array.isArray(history.x_time) ? history.x_time : [];
  const models = history && Array.isArray(history.models) ? history.models : [];
  const visibleModels = models.filter(m => Number(m.total_tokens || 0) > 0 || normalizeSeries(m.tokens_usage, dates.length).some(v => v > 0));

  if (!history || !dates.length || !visibleModels.length) {
    return `<div class="empty-history">暂无近 30 天历史数据</div>`;
  }

  const width = 520;
  const height = 180;
  const padX = 24;
  const padY = 18;
  const normalizedModels = visibleModels.map((model, idx) => ({
    ...model,
    color: HISTORY_COLORS[idx % HISTORY_COLORS.length],
    tokens_usage: normalizeSeries(model.tokens_usage, dates.length),
  }));
  const maxValue = Math.max(1, ...normalizedModels.flatMap(m => m.tokens_usage));
  const points = buildHistoryPointCoords(normalizedModels[0].tokens_usage, maxValue, width, height, padX, padY);
  const lines = normalizedModels.map(model => `
    <polyline class="history-line" stroke="${model.color}" points="${buildPolyline(model.tokens_usage, maxValue, width, height, padX, padY)}"></polyline>
  `).join('');
  const dots = normalizedModels.map((model, i) => `<circle class="history-cursor-dot" data-idx="${i}" data-model="${model.model_name}" cx="0" cy="0" r="3" fill="${model.color}" style="display:none"></circle>`).join('');
  const modelRows = normalizedModels.map(model => {
    const calls = model.total_calls === null || model.total_calls === undefined
      ? ''
      : ` · ${formatCount(model.total_calls)} 次`;
    return `<div class="history-model-row">
      <span class="history-model-name"><span class="history-dot" style="background:${model.color}"></span><span>${model.model_name}</span></span>
      <span>${formatTokens(model.total_tokens)} tokens${calls}</span>
    </div>`;
  }).join('');

  const cardKeyForChart = data.instance_id || data.provider;
  const chartId = `history-chart-${cardKeyForChart.replace(/[^a-zA-Z0-9]/g, '')}`;
  return `
    <div class="history-summary">近 30 天：${formatTokens(history.total_tokens)} tokens · ${formatCount(history.total_calls)} 次调用</div>
    <div class="history-chart" data-history-chart="${cardKeyForChart}" id="${chartId}">
      <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="近 30 天模型 token 用量折线图" style="width:100%;height:100%;">
        <line class="history-grid-line" x1="${padX}" y1="${padY}" x2="${width - padX}" y2="${padY}"></line>
        <line class="history-grid-line" x1="${padX}" y1="${height / 2}" x2="${width - padX}" y2="${height / 2}"></line>
        <line class="history-axis" x1="${padX}" y1="${height - padY}" x2="${width - padX}" y2="${height - padY}"></line>
        ${lines}
        <line class="history-cursor" data-history-cursor x1="0" y1="${padY}" x2="0" y2="${height - padY}" style="display:none"></line>
        ${dots}
      </svg>
      <div class="history-tooltip" data-history-tooltip></div>
    </div>
    <div>${modelRows}</div>`;
}

function renderHeader(data, subtitle) {
  const cardKey = data.instance_id || data.provider;
  const canToggle = hasHistoryUsage(data);
  const mode = cardViewModes[cardKey] || 'usage';
  const toggle = canToggle
    ? `<button class="view-toggle" data-view-toggle="${cardKey}" onclick="toggleCardView('${cardKey.replace(/'/g, "\\'")}')">${mode === 'history' ? '用量' : '历史'}</button>`
    : '';
  const isV2 = !!data.instance_label;
  const titleHtml = isV2
    ? `<div class="card-title-group"><span class="card-title">${data.type_display_name || ''}</span><span class="card-type-label">${data.instance_label}</span></div>`
    : `<span class="card-title">${data.provider}</span>`;
  const right = subtitle || toggle
    ? `<span class="card-header-right">${subtitle ? `<span class="card-subtitle">${subtitle}</span>` : ''}${toggle}</span>`
    : '';
  return `<div class="card-header">${titleHtml}${right}</div>`;
}

function renderGrid(data) {
  const grid = document.getElementById('grid');
  grid.innerHTML = data.map(renderCard).join('');
  if (activeTab === 'balance') grid.style.display = 'grid';
  bindHistoryCharts();
}

function bindHistoryCharts() {
  const charts = document.querySelectorAll('[data-history-chart]');
  charts.forEach(chartEl => {
    const cardKey = chartEl.getAttribute('data-history-chart');
    const data = latestV2Data.find(d => (d.instance_id || d.provider) === cardKey);
    if (!data || !data.history_usage) return;

    const history = data.history_usage;
    const dates = history.x_time || [];
    const models = history.models || [];
    const visibleModels = models.filter(m => Number(m.total_tokens || 0) > 0 || normalizeSeries(m.tokens_usage, dates.length).some(v => v > 0));
    if (!dates.length || !visibleModels.length) return;

    const width = 520;
    const height = 180;
    const padX = 24;
    const padY = 18;
    const normalizedModels = visibleModels.map((model, idx) => ({
      ...model,
      color: HISTORY_COLORS[idx % HISTORY_COLORS.length],
      tokens_usage: normalizeSeries(model.tokens_usage, dates.length),
    }));
    const maxValue = Math.max(1, ...normalizedModels.flatMap(m => m.tokens_usage));
    const points = buildHistoryPointCoords(normalizedModels[0].tokens_usage, maxValue, width, height, padX, padY);

    const tooltipEl = chartEl.querySelector('[data-history-tooltip]');
    const cursorEl = chartEl.querySelector('[data-history-cursor]');
    const dotEls = Array.from(chartEl.querySelectorAll('.history-cursor-dot'));
    const svg = chartEl.querySelector('svg');

    chartEl.addEventListener('mousemove', (event) => {
      handleHistoryHover(event, svg, tooltipEl, cursorEl, dotEls, points, normalizedModels, dates, width, height, padX, padY);
    });
    chartEl.addEventListener('mouseleave', () => {
      hideHistoryTooltip(tooltipEl, cursorEl, dotEls);
    });

    // Touch support for mobile
    function makeTouchEvent(touch) {
      return { clientX: touch.clientX, clientY: touch.clientY };
    }
    chartEl.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return;
      e.preventDefault();
      handleHistoryHover(makeTouchEvent(e.touches[0]), svg, tooltipEl, cursorEl, dotEls, points, normalizedModels, dates, width, height, padX, padY);
    }, { passive: false });
    chartEl.addEventListener('touchmove', (e) => {
      if (e.touches.length !== 1) return;
      e.preventDefault();
      handleHistoryHover(makeTouchEvent(e.touches[0]), svg, tooltipEl, cursorEl, dotEls, points, normalizedModels, dates, width, height, padX, padY);
    }, { passive: false });
    chartEl.addEventListener('touchend', () => {
      hideHistoryTooltip(tooltipEl, cursorEl, dotEls);
    });
    chartEl.addEventListener('touchcancel', () => {
      hideHistoryTooltip(tooltipEl, cursorEl, dotEls);
    });
  });
}

function toggleCardView(cardKey) {
  cardViewModes[cardKey] = cardViewModes[cardKey] === 'history' ? 'usage' : 'history';
  renderV2Grid(latestV2Data);
}

function formatTokens(n) {
  return (n / 1000000).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' M';
}

function formatUsd(v) {
  if (v === null || v === undefined) return '—';
  if (v > 0 && v < 0.01) return '<$0.01';
  return '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function renderCard(data) {
  if (data.error) {
    return `
      <div class="card">
        <div class="card-header">
          <span class="card-title">${data.provider}</span>
        </div>
        <div class="limit-meta">${data.error}</div>
      </div>`;
  }

  // Card with model_stats (e.g. Codex), or a USD wallet/plan card with no
  // calls yet — both share the "$ balance + usage bar" layout. Without this
  // fallback, an empty-model_stats USD card drops into the rate-limit branch
  // below and renders a "次"-unit bar with a doubled "¥$" balance.
  const usdCard = data.limits.length > 0 && /USD/i.test(data.limits[0].time_unit || '');
  if ((data.model_stats && data.model_stats.length > 0) || usdCard) {
    const limit = data.limits[0];
    const pct = limit ? (parseFloat(limit.used) / parseFloat(limit.limit) * 100) : 0;
    const usedStr = limit ? `$${parseFloat(limit.used).toFixed(2)}` : '';
    const limitStr = limit ? `$${parseFloat(limit.limit).toFixed(2)}` : '';

    const balanceRows = Object.entries(data.balances || {}).map(([key, val]) =>
      `<div class="balance-row"><span>${key}</span><span>${val}</span></div>`
    ).join('');

    const modelRows = [...data.model_stats]
      .sort((a, b) => b.requests - a.requests)
      .slice(0, 3)
      .map(m =>
        `<div class="balance-row">
          <span>${m.model}</span>
          <span>${formatTokens(m.total_tokens)} tokens · ${m.requests.toLocaleString()} 次</span>
        </div>`
      ).join('');

    return `
      <div class="card">
        ${renderHeader(data, '')}
        ${balanceRows}
        <div class="limit-row" style="margin-top:0.75rem;">
          <div class="limit-label">
            <span>余额使用 (${usedStr} / ${limitStr})</span>
            <span>${pct.toFixed(1)}%</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill ${barClass(pct)}" style="width:${Math.min(pct, 100)}%"></div>
          </div>
        </div>
        ${modelRows
          ? `<div style="margin-top:1rem;padding-top:0.75rem;border-top:1px solid #334155;">${modelRows}</div>`
          : ''}
      </div>`;
  }

  // Balance card (no rate limits, just balances)
  if (data.balances && Object.keys(data.balances).length > 0 && !data.limits.length) {
    const subtitle = data.membership_level || data.user_id || '';
    const balanceRows = Object.entries(data.balances).map(([key, val]) => {
      const label = BALANCE_LABELS[key] || key;
      const formattedValue = MONEY_BALANCE_KEYS.has(key) ? `¥${val}` : val;
      return `<div class="balance-row"><span>${label}</span><span>${formattedValue}</span></div>`;
    }).join('');

    return `
      <div class="card">
        ${renderHeader(data, subtitle)}
        ${balanceRows}
      </div>`;
  }

  // Rate-limit card
  const limitsHtml = data.limits.map(l => {
    let pct, pctStr, barWidth;
    if (l.limit_type === 'PERCENT') {
      pct = parseFloat(l.used);
      pctStr = `${pct.toFixed(2)}%`;
      barWidth = Math.min(pct, 100);
    } else {
      pct = l.limit ? Math.round(parseInt(l.used) * 100 / parseInt(l.limit)) : null;
      const usedNum = parseInt(l.used);
      const limitNum = parseInt(l.limit);
      const showCount = limitNum > 200;
      pctStr = pct !== null ? `${pct}%` : `${l.used}/${l.limit}`;
      const countStr = showCount ? `${usedNum.toLocaleString()} / ${limitNum.toLocaleString()} 次` : '';
      if (showCount) pctStr = countStr;
      barWidth = pct !== null ? pct : 0;
    }
    const detailsHtml = l.usage_details.length
      ? l.usage_details.map(d =>
          `<div class="detail-row"><span>${d.model_code}</span><span>${d.usage}</span></div>`
        ).join('')
      : '';

    return `
      <div class="limit-row">
        <div class="limit-label">
          <span>${l.limit_type === 'PERCENT' ? l.time_unit : formatTimeWindow(l)}</span>
          <span>${pctStr}</span>
        </div>
        <div class="bar-bg">
          <div class="bar-fill ${barClass(pct || 0)}" style="width:${barWidth}%"></div>
        </div>
        ${l.reset_time ? `<div class="limit-meta">${formatReset(l.reset_time)}</div>` : ''}
        ${detailsHtml ? `<div style="margin-top:0.5rem">${detailsHtml}</div>` : ''}
      </div>`;
  }).join('');

  const subtitle = data.membership_level || data.user_id || '';

  const balancesHtml = data.balances && Object.keys(data.balances).length
    ? '<div style="margin-top:1rem;padding-top:0.75rem;border-top:1px solid #334155;">'
      + Object.entries(data.balances).map(([key, val]) => {
          const label = BALANCE_LABELS[key] || key;
          const formattedValue = MONEY_BALANCE_KEYS.has(key) ? `¥${val}` : val;
          return `<div class="balance-row"><span>${label}</span><span>${formattedValue}</span></div>`;
        }).join('')
      + '</div>'
    : '';

  const tokenUsageHtml = data.token_usage && data.token_usage.length
    ? '<div style="margin-top:1rem;padding-top:0.75rem;border-top:1px solid #334155;">'
      + data.token_usage.map(t =>
          `<div class="balance-row"><span>${TOKEN_PERIOD_LABELS[t.period] || t.period}</span><span>${formatTokens(t.total_tokens)} tokens · ${t.total_calls.toLocaleString()} 次</span></div>`
        ).join('')
      + '</div>'
    : '';

  return `
    <div class="card">
      ${renderHeader(data, subtitle)}
      ${hasHistoryUsage(data) && cardViewModes[data.instance_id || data.provider] === 'history'
        ? renderHistoryView(data)
        : `${limitsHtml}${balancesHtml}${tokenUsageHtml}`}
    </div>`;
}

let latestV2Data = [];

function renderInstanceErrors(instanceErrors) {
  const grid = document.getElementById('grid');
  let banner = document.getElementById('instance-errors-banner');
  const keys = Object.keys(instanceErrors || {});
  if (!keys.length) {
    if (banner) banner.remove();
    return;
  }
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'instance-errors-banner';
    banner.style.cssText = 'grid-column:1/-1;font-size:0.8rem;color:#fca5a5;padding:0.4rem 0.6rem;';
    grid.prepend(banner);
  }
  banner.textContent = `${keys.length} 个实例配置错误已忽略，详见 /api/status/v2`;
}

async function refreshV2() {
  try {
    const [data, status] = await Promise.all([
      fetch('/api/usage/v2').then(r => r.json()),
      fetch('/api/status/v2').then(r => r.json()),
    ]);
    if (!status.enabled) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '<div class="empty-usage">尚未配置订阅余额（新）</div>';
      return;
    }
    if (status.config_error) {
      const grid = document.getElementById('grid');
      grid.innerHTML = `<div class="error-card"><div class="card-title">配置错误</div><div style="margin-top:0.5rem;color:#fca5a5;">${status.config_error}</div></div>`;
      return;
    }
    latestV2Data = data;
    renderV2Grid(data);
    renderInstanceErrors(status.instance_errors || {});
    document.getElementById('loading').style.display = 'none';
    const updatedEl = document.querySelector('.updated');
    if (updatedEl && status.last_updated) {
      updatedEl.textContent = '最后更新：' + status.last_updated;
    }
  } catch (e) {
    document.getElementById('loading').textContent = `加载失败：${e.message}`;
  }
}

function renderV2Grid(data) {
  const grid = document.getElementById('grid');
  if (!data || data.length === 0) {
    grid.innerHTML = '<div class="empty-usage">暂无数据</div>';
    return;
  }
  grid.innerHTML = data.map(renderCard).join('');
  if (activeTab === 'balance') grid.style.display = 'grid';
  bindHistoryCharts();
}

setInterval(() => { if (activeTab === 'balance') refreshV2(); }, 60000);
setInterval(() => { if (activeTab === 'usage') refreshUsageChart(); }, 60000);
</script>
